name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npx vitest run src/

      # КРИТИЧНИЙ КРОК: ---Запускаємо сервер у фоні та чекаємо, поки він "прокинеться"
      - name: Run Playwright tests
        run: |
          npm run dev & 
          npx wait-on http://localhost:5173 && npx playwright test tests.spec.js