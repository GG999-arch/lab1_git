name: CI/CD Pipeline

# Тригери для запуску пайплайну
on:
  # Запуск при push у гілки main та develop
  push:
    branches:
      - main
      - develop
  # Запуск при створенні Pull Request
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job для збірки та тестування
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Отримання коду з репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # Налаштування Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Встановлюємо браузери для Playwright, щоб тести не падали
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run linter
        run: npm run lint

      # Запускаємо звичайні unit-тести (Vitest)
      - name: Run unit tests
        run: npm run test:unit

      # Запускаємо браузерні тести (Playwright)
      - name: Run Playwright tests
        run: npx playwright test