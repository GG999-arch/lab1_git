name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # 1. Встановлюємо браузери (без цього Playwright не запрацює)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run linter
        run: npm run lint

      # 2. Запускаємо ТІЛЬКИ ті тести, які лежать у папці src (юніт-тести)
      # Це щоб Vitest не чіпав tests.spec.js
      - name: Run unit tests
        run: npx vitest run src/

      # 3. Запускаємо браузерні тести окремо
      - name: Run Playwright tests
        run: npx playwright test tests.spec.js